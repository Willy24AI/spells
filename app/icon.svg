<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <clipPath id="body">
      <ellipse cx="32" cy="38" rx="13" ry="16"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#FBBF24"/>

  <!-- Wings -->
  <g fill="#FFFFFF" fill-opacity="0.85">
    <ellipse cx="24" cy="22" rx="9" ry="6" transform="rotate(-25 24 22)"/>
    <ellipse cx="40" cy="22" rx="9" ry="6" transform="rotate(25 40 22)"/>
  </g>

  <!-- Antennae -->
  <g stroke="#1F2937" stroke-width="2.4" stroke-linecap="round" fill="none">
    <path d="M28 16 C26 10 23 9 21 8"/>
    <path d="M36 16 C38 10 41 9 43 8"/>
  </g>
  <circle cx="20.5" cy="7.5" r="2.2" fill="#1F2937"/>
  <circle cx="43.5" cy="7.5" r="2.2" fill="#1F2937"/>

  <!-- Body -->
  <ellipse cx="32" cy="38" rx="13" ry="16" fill="#1F2937"/>

  <!-- Yellow stripes, clipped to the body -->
  <g fill="#FBBF24" clip-path="url(#body)">
    <rect x="18" y="30" width="28" height="4.5"/>
    <rect x="18" y="39" width="28" height="4.5"/>
    <rect x="18" y="48" width="28" height="4.5"/>
  </g>
</svg>
